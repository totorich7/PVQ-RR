<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVQ-RR 価値観分析ワークシート</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --answered-bg: #fffde7;
            --error-bg: #fff5f5;
            --error-border: #e74c3c;
        }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: var(--primary-color); border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; }
        .instruction { background: #eef2f3; padding: 15px; border-radius: 5px; margin-bottom: 20px; font-size: 0.9em; }
        
        /* --- 追加: 進捗バーのスタイル --- */
        .progress-container {
            position: -webkit-sticky;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--card-bg);
            padding: 15px 0;
            border-bottom: 2px solid var(--accent-color);
            margin: -30px -30px 20px -30px; /* 親のパディングを相殺して横いっぱいに表示 */
            border-radius: 8px 8px 0 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 30px;
            font-size: 0.9em;
            font-weight: bold;
        }
        .progress-bar-bg {
            background-color: #eee;
            height: 10px;
            width: 100%;
            border-radius: 5px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-bar-fill {
            background-color: var(--accent-color);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s;
        }
        /* -------------------------- */

        .question-item {
            margin-bottom: 15px;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
            transition: all 0.3s ease;
            border-left: 5px solid #ddd;
        }
        
        .question-item.answered {
            background-color: var(--answered-bg);
            border-left-color: #f1c40f;
        }

        .question-item.unanswered {
            background-color: var(--error-bg);
            border-left-color: var(--error-border);
        }

        .question-text { font-weight: bold; margin-bottom: 15px; display: block; }

        .options {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
        }

        .option-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
            background: #fff;
            transition: background 0.2s, border-color 0.2s;
            user-select: none;
        }

        .option-label:hover {
            background-color: #f0f7ff;
            border-color: var(--accent-color);
        }

        .option-label:has(input:checked) {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        input[type="radio"] { margin-bottom: 5px; cursor: pointer; }

        .btn-container { text-align: center; margin-top: 30px; }
        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: background 0.3s, transform 0.2s;
        }
        button:hover { background-color: #2980b9; transform: translateY(-2px); }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        #export-btn { background-color: #27ae60; padding: 10px 30px; }
        #export-btn:hover { background-color: #219653; }
        #reset-btn { background-color: #95a5a6; padding: 10px 30px; }
        #reset-btn:hover { background-color: #7f8c8d; }

        #result-area { display: none; margin-top: 20px; padding-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #f2f2f2; }
        .positive { color: #e74c3c; font-weight: bold; }
        .negative { color: #7f8c8d; }
        
        .analysis-box {
            margin-top: 20px;
            padding: 20px;
            border-left: 5px solid var(--accent-color);
            background: #f9f9f9;
        }

        @media (max-width: 480px) {
            .options { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .action-buttons { flex-direction: column; align-items: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="main-title">PVQ-RR 価値観分析</h1>

    <div class="progress-container" id="sticky-progress">
        <div class="progress-info">
            <span>回答進捗</span>
            <span id="progress-text">0 / 57 (0%)</span>
        </div>
        <div class="progress-info">
            <div class="progress-bar-bg">
                <div id="progress-bar" class="progress-bar-fill"></div>
            </div>
        </div>
    </div>

    <div class="instruction" id="instruction-area">
         <p>各項目は特定の人物像を描写しています。その人物の考え方や重視していることが、あなた自身とどれほど一致するかを1〜6点で回答してください。</p>
         <p style="font-size: 0.8em; color: #666;">1:全く似ていない / 2:似ていない / 3:あまり似ていない / 4:少し似ている / 5:似ている / 6:非常に似ている</p>
    </div>

    <form id="pvq-form">
        <div id="questions-container"></div>
        <div class="btn-container">
            <button type="button" id="calc-btn" onclick="calculateResults()">結果を分析する</button>
        </div>
    </form>

    <div id="result-area">
        <div class="action-buttons">
            <button type="button" id="export-btn" onclick="exportPDF()">結果をPDFにエクスポート</button>
            <button type="button" id="reset-btn" onclick="resetAll()">もう一度最初から回答する</button>
        </div>
        
        <p>全体平均 (MRAT): <span id="mrat-value" style="font-weight:bold;"></span></p>
        <div id="result-table-container"></div>
        
        <div class="analysis-box">
            <h3>結果の解釈</h3>
            <p><strong>上位価値観（プラスの値）:</strong> 相対的に重視しているものです。</p>
            <p id="top-values"></p>
        </div>
    </div>
</div>

    const categoryMap = {};
    questions.forEach(q => {
        if (!categoryMap[q.cat]) categoryMap[q.cat] = [];
        categoryMap[q.cat].push(q.id);
    });

    window.onload = function() {
        renderQuestions();
        loadSavedAnswers();
        
        if (localStorage.getItem('pvq_show_result') === 'true') {
            calculateResults(true);
        }
    };

    function renderQuestions() {
        const container = document.getElementById('questions-container');
        questions.forEach(q => {
            const div = document.createElement('div');
            div.className = 'question-item';
            div.id = `q-block-${q.id}`;
            
            let optionsHtml = '';
            for (let i = 1; i <= 6; i++) {
                optionsHtml += `
                    <label class="option-label">
                        <input type="radio" name="q${q.id}" value="${i}" onchange="saveAndMark(${q.id})">
                        ${i}
                    </label>`;
            }
            div.innerHTML = `
                <span class="question-text">${q.id}. ${q.text}</span>
                <div class="options">${optionsHtml}</div>
            `;
            container.appendChild(div);
        });
    }

    // --- 追加: 進捗バー更新用関数 ---
    function updateProgressBar() {
        const answeredCount = document.querySelectorAll('.question-item.answered').length;
        const totalQuestions = questions.length;
        const percentage = Math.round((answeredCount / totalQuestions) * 100);

        document.getElementById('progress-text').innerText = `${answeredCount} / ${totalQuestions} (${percentage}%)`;
        document.getElementById('progress-bar').style.width = `${percentage}%`;
        
        if (percentage === 100) {
            document.getElementById('progress-bar').style.backgroundColor = '#27ae60';
        } else {
            document.getElementById('progress-bar').style.backgroundColor = 'var(--accent-color)';
        }
    }

    function saveAndMark(id) {

        const formData = new FormData(form);
        const answers = {};
        formData.forEach((value, key) => {
            answers[key] = value;
        });
        localStorage.setItem('pvq_answers', JSON.stringify(answers));
        updateProgressBar(); // 進捗更新
    }

    function markAsAnswered(id) {
        const block = document.getElementById(`q-block-${id}`);
        if (block) {
            block.classList.add('answered');
            block.classList.remove('unanswered');
        }
    }

    function loadSavedAnswers() {
        const savedData = localStorage.getItem('pvq_answers');
        if (savedData) {
            const answers = JSON.parse(savedData);
            for (const [name, value] of Object.entries(answers)) {
                const radio = document.querySelector(`input[name="${name}"][value="${value}"]`);
                if (radio) {
                    radio.checked = true;
                    markAsAnswered(name.replace('q', ''));
                }
            }
        }
        updateProgressBar(); // 読み込み時に進捗更新
    }

    function resetAll() {
        if (confirm("回答データをすべて削除して、最初からやり直しますか？")) {
            localStorage.removeItem('pvq_answers');
            localStorage.removeItem('pvq_show_result');
            location.reload();
        }
    }

    function calculateResults(isReload = false) {
        const form = document.getElementById('pvq-form');
        const formData = new FormData(form);
        const unanswered = [];
        const scores = {};
        let totalSum = 0;

        questions.forEach(q => {
            const val = formData.get(`q${q.id}`);
            const block = document.getElementById(`q-block-${q.id}`);
            
            if (!val) {
                unanswered.push(q.id);
                if (block) block.classList.add('unanswered');
            } else {
                const num = parseInt(val);
                scores[q.id] = num;
                totalSum += num;
            }
        });

        if (unanswered.length > 0 && !isReload) {
            alert("未回答の項目があります。番号: " + unanswered.join(", "));
            document.getElementById(`q-block-${unanswered[0]}`).scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        } else if (unanswered.length > 0 && isReload) {
            return;
        }

        localStorage.setItem('pvq_show_result', 'true');

        const mrat = totalSum / 57;
        document.getElementById('mrat-value').innerText = mrat.toFixed(2);

        const results = [];
        for (const cat in categoryMap) {
            const sum = categoryMap[cat].reduce((acc, id) => acc + scores[id], 0);
            const avg = sum / categoryMap[cat].length;
            const centered = avg - mrat;
            results.push({ cat, centered });
        }

        results.sort((a, b) => b.centered - a.centered);

        let tableHtml = '<table><tr><th style="width: 20%;">価値観カテゴリ</th><th style="width: 15%;">スコア</th><th>定義・特徴</th></tr>';
        results.forEach(r => {
            const className = r.centered >= 0 ? 'positive' : 'negative';
            const sign = r.centered >= 0 ? '+' : '';
            const desc = valueDescriptions[r.cat];
            tableHtml += `
                <tr>
                    <td style="font-weight: bold;">${r.cat}</td>
                    <td class="${className}" style="font-size: 1.1em;">${sign}${r.centered.toFixed(2)}</td>
                    <td style="text-align: left; font-size: 0.9em; padding: 12px;">
                        <div style="margin-bottom: 5px;"><strong>【定義】</strong> ${desc.def}</div>
                        <div><strong>【特徴】</strong> ${desc.char}</div>
                    </td>
                </tr>`;
        });
        tableHtml += '</table>';
        document.getElementById('result-table-container').innerHTML = tableHtml;

        const top3 = results.slice(0, 3).map(r => r.cat).join('、');
        document.getElementById('top-values').innerHTML = `あなたの現在の最優先価値観は <strong>「${top3}」</strong> です。`;

        document.getElementById('instruction-area').style.display = 'none';
        document.getElementById('sticky-progress').style.display = 'none'; // 分析後はバーを隠す
        document.getElementById('main-title').innerText = 'PVQ-RR 価値観分析結果';
        form.style.display = 'none';
        
        document.getElementById('result-area').style.display = 'block';
        if (!isReload) window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function exportPDF() {
        const element = document.querySelector('.container');
        const actionButtons = document.querySelector('.action-buttons');
        actionButtons.style.display = 'none';
        
        const opt = {
            margin:       [10, 10, 10, 10],
            filename:     'PVQ-RR_価値観分析結果.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, scrollY: 0, backgroundColor: '#ffffff' },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save().then(() => {
            actionButtons.style.display = 'flex';
        });
    }
</script>
</body>
</html>
